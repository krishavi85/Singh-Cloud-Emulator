name: Security and platform checks

on:
  pull_request:
  push:
    branches: [main, security/public-production-hardening, platform-expansion]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --ignore-scripts --no-fund
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
