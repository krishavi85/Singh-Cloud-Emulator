name: Security and platform checks

on:
  pull_request:
  push:
    branches: [main, security/public-production-hardening, platform-expansion, equivalence-stack]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --ignore-scripts --no-fund
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
      - name: Validate equivalence Compose stack
        env:
          CODE_SERVER_PASSWORD: ci-code-server-password
          TURN_REALM: emulator.example.com
          TURN_USERNAME: ci-turn
          TURN_PASSWORD: ci-turn-password
          TURN_EXTERNAL_IP: 203.0.113.10
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          MINIO_ROOT_USER: ci-minio
          MINIO_ROOT_PASSWORD: ci-minio-password
        run: docker compose -f compose.equivalence.yml config >/dev/null
