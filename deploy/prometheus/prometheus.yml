global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: singh-cloud-emulator

scrape_configs:
  - job_name: singh-cloud-emulator
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: [gateway:443]
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    tls_config:
      insecure_skip_verify: true
