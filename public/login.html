<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sign in to Singh Cloud Emulator">
  <title>Sign in · Singh Cloud Emulator</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card panel">
    <p class="eyebrow">SECURE ANDROID CLOUD LAB</p>
    <h1>Singh Cloud Emulator</h1>
    <p class="muted">Sign in to access your assigned Android session.</p>

    <form id="loginForm" class="auth-form">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button id="loginButton" class="primary full" type="submit">Sign in</button>
      <p id="loginError" class="auth-error" role="alert" hidden></p>
    </form>
  </main>
  <script src="/login.js" defer></script>
</body>
</html>
