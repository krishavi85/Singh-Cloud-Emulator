services:
  ide:
    build:
      context: .
      dockerfile: deploy/equivalence/ide/Dockerfile
      args:
        ANDROID_COMMANDLINE_TOOLS_URL: ${ANDROID_COMMANDLINE_TOOLS_URL:-}
    restart: unless-stopped
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:?Set CODE_SERVER_PASSWORD}
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
    volumes:
      - workspaces:/workspace
      - gradle_cache:/home/coder/.gradle
    ports:
      - "127.0.0.1:${CODE_SERVER_PORT:-8444}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=1g,nosuid,nodev
      - /home/coder/.local:size=512m,nosuid,nodev
      - /home/coder/.config:size=128m,nosuid,nodev
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 1024
    mem_limit: 6g
    cpus: 4.0
    networks: [control, worker]

  appium:
    build:
      context: .
      dockerfile: deploy/equivalence/appium/Dockerfile
    restart: unless-stopped
    environment:
      ANDROID_ADB_SERVER_ADDRESS: ${ANDROID_ADB_SERVER_ADDRESS:-android-worker}
      ANDROID_ADB_SERVER_PORT: ${ANDROID_ADB_SERVER_PORT:-5037}
    ports:
      - "127.0.0.1:${APPIUM_PORT:-4723}:4723"
    read_only: true
    tmpfs:
      - /tmp:size=1g,nosuid,nodev
      - /home/appium/.cache:size=512m,nosuid,nodev
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 512
    mem_limit: 2g
    cpus: 2.0
    networks: [control, worker]

  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    restart: unless-stopped
    command:
      - mitmweb
      - --web-host
      - 0.0.0.0
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - --web-port
      - "8081"
      - --set
      - save_stream_file=/captures/flows-%Y%m%d-%H%M.mitm
      - --set
      - hardump=/captures/latest.har
    volumes:
      - proxy_data:/home/mitmproxy/.mitmproxy
      - proxy_captures:/captures
    ports:
      - "127.0.0.1:${MITMPROXY_WEB_PORT:-8081}:8081"
    read_only: true
    tmpfs:
      - /tmp:size=512m,nosuid,nodev
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    networks: [control, worker]

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    command:
      - --no-cli
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM:?Set TURN_REALM}
      - --user=${TURN_USERNAME:?Set TURN_USERNAME}:${TURN_PASSWORD:?Set TURN_PASSWORD}
      - --external-ip=${TURN_EXTERNAL_IP:?Set TURN_EXTERNAL_IP}
      - --min-port=49160
      - --max-port=49200
      - --log-file=stdout
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    networks: [control]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-singh_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-singh_cloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [control]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [redis-server, --appendonly, "yes", --requirepass, "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, -a, "${REDIS_PASSWORD}", ping]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [control]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    volumes:
      - object_data:/data
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks: [control]

networks:
  control:
    internal: true
  worker:
    name: singh-worker-net
    internal: true

volumes:
  workspaces:
  gradle_cache:
  proxy_data:
  proxy_captures:
  postgres_data:
  redis_data:
  object_data:
